<!DOCTYPE html>
<html>
<head>
    <title>Settings - Auth System</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/dashboard.css') }}">
</head>
<body>
    <div class="app">
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo">CompanyName</div>
            </div>
            <nav class="nav-menu">
                <a href="/dashboard" class="nav-item">
                    <span>🏠</span> Dashboard
                </a>
                <a href="/profile" class="nav-item">
                    <span>👤</span> Profile
                </a>
                <a href="/settings" class="nav-item active">
                    <span>⚙️</span> Settings
                </a>
            </nav>
        </aside>

        <main class="main-content">
            <header class="top-header">
                <h1 class="page-title">Settings</h1>
                <div class="user-menu">
                    <div class="avatar" id="userAvatar">U</div>
                </div>
            </header>

            <div class="content">
                <div class="settings-section">
                    <div class="section-title">Update Profile</div>
                    <div class="form-group">
                        <label class="form-label">Username</label>
                        <input type="text" id="new_username" class="form-input" placeholder="New username">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Email</label>
                        <input type="email" id="new_email" class="form-input" placeholder="New email">
                    </div>
                    <div class="form-group">
                        <button class="btn btn-primary" id="updateProfileBtn">Save Changes</button>
                    </div>
                </div>

                <div class="settings-section">
                    <div class="section-title">Change Password</div>
                    <div class="form-group">
                        <label class="form-label">Current Password</label>
                        <input type="password" id="current_password" class="form-input">
                    </div>
                    <div class="form-group">
                        <label class="form-label">New Password</label>
                        <input type="password" id="new_password2" class="form-input">
                    </div>
                    <div class="form-group">
                        <button class="btn btn-primary" id="changePasswordBtn">Update Password</button>
                    </div>
                </div>

                <div class="settings-section">
                    <div class="form-group">
                        <button class="btn btn-danger" id="logoutBtn">Sign Out</button>
                    </div>
                </div>

                <div id="message"></div>
            </div>
        </main>
    </div>
    <script src="{{ url_for('static', filename='js/dashboard.js') }}"></script>
</body>
</html>
